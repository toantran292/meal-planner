name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cho phép workflow ghi vào GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy 1 deploy tại 1 thời điểm, không hủy deploy đang chạy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Site là static thuần, deploy nguyên thư mục gốc
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
